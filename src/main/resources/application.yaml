spring:
  application:
    name: webnei
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${WEBNEI_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/webnei}
    username: ${WEBNEI_DATASOURCE_USERNAME:postgres}
    password: ${WEBNEI_DATASOURCE_PASSWORD:postgres}
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

webnei:
  dataset:
    default-id: ${WEBNEI_DEFAULT_DATASET_ID:}
  assets:
    public-url: ${WEBNEI_ASSETS_PUBLIC_URL:/assets}
