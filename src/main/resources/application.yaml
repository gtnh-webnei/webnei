spring:
  application:
    name: webnei
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${WEBNEI_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nesql}
    username: ${WEBNEI_DATASOURCE_USERNAME:postgres}
    password: ${WEBNEI_DATASOURCE_PASSWORD:postgres}
  jdbc:
    template:
      fetch-size: 200
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  mvc:
    problemdetails:
      enabled: true

webnei:
  assets:
    public-url: ${WEBNEI_ASSETS_PUBLIC_URL:/assets}
  cors:
    dev-origins:
      - http://localhost:5173
